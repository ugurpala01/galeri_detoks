name: Flutter Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.7'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: |
          flutter clean
          set +e
          flutter build apk --release --android-skip-build-dependency-validation 2>&1 | tee build.log
          BUILD_EXIT=${PIPESTATUS[0]}

          echo "Generated APK files:"
          find . -type f \( -name "*.apk" -o -name "*.aab" \) -print

          APK_PATH=$(find . -type f -name "app-release.apk" -print -quit)
          if [ -z "$APK_PATH" ]; then
            echo "Flutter APK build failed. Relevant Gradle errors:"
            grep -E "FAILURE:|What went wrong:|Caused by:|Execution failed for task|error:" build.log || true
            exit "$BUILD_EXIT"
          fi

          if [ "$BUILD_EXIT" -ne 0 ]; then
            echo "Flutter returned exit code $BUILD_EXIT, but an APK was generated. Continuing."
          fi

          if [ ! -s "$APK_PATH" ]; then
            echo "APK bulunamadı."
            exit 1
          fi

          mkdir -p artifacts
          cp "$APK_PATH" artifacts/app-release.apk

      - name: Upload APK
        uses: actions/upload-artifact@v5
        with:
          name: release-apk
          path: artifacts/app-release.apk

